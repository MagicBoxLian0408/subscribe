syntax = "proto3";

package magicbox.subscribe.v1;

option java_package = "kr.magicbox.subscribe.grpc.subscribe";
option java_outer_classname = "SubscribeServiceProto";
option java_multiple_files = true;

service SubscribeService {
  rpc GetSubscriberCount(GetSubscriberCountRequest) returns (GetSubscriberCountResponse);
  rpc IsSubscribed(IsSubscribedRequest) returns (IsSubscribedResponse);
  rpc GetSubscribedCreatorIds(GetSubscribedCreatorIdsRequest) returns (GetSubscribedCreatorIdsResponse);
}

message GetSubscriberCountRequest {
  int64 creator_id = 1;
}

message GetSubscriberCountResponse {
  int64 subscriber_count = 1;
}

message IsSubscribedRequest {
  int64 creator_id = 1;
  int64 user_id = 2;
}

message IsSubscribedResponse {
  bool subscribed = 1;
}

message GetSubscribedCreatorIdsRequest {
  int64 user_id = 1;
}

message GetSubscribedCreatorIdsResponse {
  repeated int64 creator_ids = 1;
}
